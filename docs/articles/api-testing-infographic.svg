<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Designing API Testing Architecture</title>
  <desc>Infographic showing layered API testing architecture with Controller Pattern</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff">
    <line x1="0" y1="0" x2="0" y2="630" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke-width="1"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Title Section -->
  <text x="60" y="70" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" letter-spacing="3" text-transform="uppercase" opacity="0.6">API TEST ARCHITECTURE</text>
  <text x="60" y="115" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700">Designing API Testing That</text>
  <text x="60" y="158" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700">Developers <tspan fill="#3b82f6">Actually Want</tspan> to Maintain</text>

  <!-- Divider -->
  <rect x="60" y="178" width="80" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Architecture Layers - Right Side -->
  <!-- Layer 1: Tests -->
  <rect x="660" y="45" width="500" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="660" y="45" width="4" height="80" rx="2" fill="#8b5cf6"/>
  <text x="684" y="75" fill="#c4b5fd" font-family="'Courier New', monospace" font-size="13" font-weight="600">TESTS</text>
  <text x="684" y="100" fill="#94a3b8" font-family="'Courier New', monospace" font-size="12">test('...', async ({ tokensService }) =&gt; { ... })</text>

  <!-- Arrow -->
  <polygon points="910,130 900,125 920,125" fill="#475569"/>
  <line x1="910" y1="125" x2="910" y2="140" stroke="#475569" stroke-width="2"/>

  <!-- Layer 2: Fixtures -->
  <rect x="660" y="140" width="500" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="660" y="140" width="4" height="70" rx="2" fill="#3b82f6"/>
  <text x="684" y="168" fill="#93c5fd" font-family="'Courier New', monospace" font-size="13" font-weight="600">FIXTURES</text>
  <text x="684" y="190" fill="#94a3b8" font-family="'Courier New', monospace" font-size="12">Dependency injection — declare, don't construct</text>

  <!-- Arrow -->
  <polygon points="910,215 900,210 920,210" fill="#475569"/>
  <line x1="910" y1="210" x2="910" y2="228" stroke="#475569" stroke-width="2"/>

  <!-- Layer 3: Services + Types side by side -->
  <rect x="660" y="228" width="240" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="660" y="228" width="4" height="90" rx="2" fill="#10b981"/>
  <text x="684" y="258" fill="#6ee7b7" font-family="'Courier New', monospace" font-size="13" font-weight="600">SERVICES</text>
  <text x="684" y="278" fill="#94a3b8" font-family="'Courier New', monospace" font-size="11">TokensService</text>
  <text x="684" y="295" fill="#94a3b8" font-family="'Courier New', monospace" font-size="11">UserOrgService</text>

  <rect x="920" y="228" width="240" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="920" y="228" width="4" height="90" rx="2" fill="#f59e0b"/>
  <text x="944" y="258" fill="#fcd34d" font-family="'Courier New', monospace" font-size="13" font-weight="600">TYPES</text>
  <text x="944" y="278" fill="#94a3b8" font-family="'Courier New', monospace" font-size="11">Token, SignInRequest</text>
  <text x="944" y="295" fill="#94a3b8" font-family="'Courier New', monospace" font-size="11">ServiceResponse&lt;T&gt;</text>

  <!-- Arrow -->
  <polygon points="910,323 900,318 920,318" fill="#475569"/>
  <line x1="910" y1="318" x2="910" y2="338" stroke="#475569" stroke-width="2"/>

  <!-- Layer 4: BaseService -->
  <rect x="660" y="338" width="500" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="660" y="338" width="4" height="80" rx="2" fill="#ef4444"/>
  <text x="684" y="368" fill="#fca5a5" font-family="'Courier New', monospace" font-size="13" font-weight="600">BASE SERVICE</text>
  <text x="684" y="390" fill="#94a3b8" font-family="'Courier New', monospace" font-size="12">send&lt;T&gt;() • setToken() • endpoint()</text>

  <!-- Arrow -->
  <polygon points="910,423 900,418 920,418" fill="#475569"/>
  <line x1="910" y1="418" x2="910" y2="438" stroke="#475569" stroke-width="2"/>

  <!-- Layer 5: Playwright -->
  <rect x="660" y="438" width="500" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="684" y="474" fill="#64748b" font-family="'Courier New', monospace" font-size="13">Playwright APIRequestContext</text>

  <!-- Key Principles - Left Bottom -->
  <text x="60" y="230" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Key Principles</text>

  <!-- Principle 1 -->
  <circle cx="75" cy="270" r="10" fill="#3b82f6" opacity="0.2"/>
  <text x="75" y="274" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">1</text>
  <text x="95" y="275" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Controller Pattern</text>
  <text x="95" y="295" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">One service per Swagger tag</text>

  <!-- Principle 2 -->
  <circle cx="75" cy="330" r="10" fill="#8b5cf6" opacity="0.2"/>
  <text x="75" y="334" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">2</text>
  <text x="95" y="335" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Typed Responses</text>
  <text x="95" y="355" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">send&lt;T&gt;() → ServiceResponse&lt;T&gt;</text>

  <!-- Principle 3 -->
  <circle cx="75" cy="390" r="10" fill="#10b981" opacity="0.2"/>
  <text x="75" y="394" fill="#10b981" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">3</text>
  <text x="95" y="395" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Token Set Once</text>
  <text x="95" y="415" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">service.setToken() in setup</text>

  <!-- Principle 4 -->
  <circle cx="75" cy="450" r="10" fill="#f59e0b" opacity="0.2"/>
  <text x="75" y="454" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">4</text>
  <text x="95" y="455" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Fixture Injection</text>
  <text x="95" y="475" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Tests declare, fixtures provide</text>

  <!-- Code snippet highlight -->
  <rect x="60" y="505" width="540" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="80" y="535" fill="#94a3b8" font-family="'Courier New', monospace" font-size="13">const { statusCode, data } = <tspan fill="#3b82f6">await</tspan> tokensService.<tspan fill="#10b981">getAll</tspan>();</text>

  <!-- Tech stack badges -->
  <rect x="60" y="580" width="95" height="28" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="599" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Playwright</text>

  <rect x="165" y="580" width="95" height="28" rx="14" fill="#1e293b" stroke="#3178c6" stroke-width="1"/>
  <text x="212" y="599" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">TypeScript</text>

  <rect x="270" y="580" width="65" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="302" y="599" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">SOLID</text>

  <!-- Author -->
  <text x="1100" y="600" fill="#64748b" font-family="system-ui, sans-serif" font-size="12" text-anchor="end">by Tuan Huynh</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>