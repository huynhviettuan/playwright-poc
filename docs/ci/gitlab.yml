# GitLab CI Template
# Copy this file to .gitlab-ci.yml when ready to enable CI.

stages:
    - quality
    - test

variables:
    NODE_VERSION: '20'
    REPORT_LAUNCH: '$CI_PIPELINE_ID-$CI_JOB_NAME'

cache:
    key:
        files:
            - package-lock.json
    paths:
        - .npm/

.default_node_job:
    image: mcr.microsoft.com/playwright:v1.51.1-jammy
    before_script:
        - npm ci --cache .npm --prefer-offline

quality:
    extends: .default_node_job
    stage: quality
    script:
        - npm run check
        - npm run lint
    artifacts:
        when: always
        expire_in: 7 days
        paths:
            - eslint-report/
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: $CI_COMMIT_BRANCH

api-tests:
    extends: .default_node_job
    stage: test
    needs:
        - quality
    script:
        - npm run test:api
    artifacts:
        when: always
        expire_in: 7 days
        paths:
            - playwright-report/
            - test-results/
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: $CI_COMMIT_BRANCH

e2e-tests:
    extends: .default_node_job
    stage: test
    needs:
        - quality
    script:
        - npm run test:e2e
    artifacts:
        when: always
        expire_in: 7 days
        paths:
            - playwright-report/
            - test-results/
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: $CI_COMMIT_BRANCH
# Required CI/CD variables:
# REPORT_API_KEY
# REPORT_ENDPOINT
# API_DOMAIN
# PASSWORD
# SUPER_ADMIN_EMAIL
# MAIL_DOMAIN
# BASE_URL
